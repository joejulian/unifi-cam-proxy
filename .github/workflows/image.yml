name: Build Docker image

on:
  push:
    tags:
      - v*

  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  buildx:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Prepare
        id: prep
        run: |
          DOCKER_IMAGE=ghcr.io/${{ github.repository_owner }}/unifi-cam-proxy
          VERSION=edge
          TAGS="${DOCKER_IMAGE}:edge"
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            TAGS="${DOCKER_IMAGE}:${VERSION},${DOCKER_IMAGE}:latest"
          fi
          TAGS="$TAGS,${DOCKER_IMAGE}:sha-${GITHUB_SHA::12}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          tag_args=()
          IFS=',' read -ra tags <<< "${{ steps.prep.outputs.tags }}"
          for tag in "${tags[@]}"; do
            tag_args+=(-t "${tag}")
          done

          docker buildx build --push \
            --platform linux/amd64,linux/arm64 \
            --label "org.opencontainers.image.source=${{ github.event.repository.html_url }}" \
            --label "org.opencontainers.image.created=${{ steps.prep.outputs.created }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            "${tag_args[@]}" \
            .
